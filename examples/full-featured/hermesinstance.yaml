apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: full-featured
spec:
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "1.4.2"
    pullPolicy: IfNotPresent
  config:
    mergeMode: merge
    raw: |
      schedules:
        morning-brief: "0 8 * * *"
      logging:
        level: info
  workspace:
    initialFiles:
      - path: notes/welcome.md
        content: |
          # Welcome
          This file was seeded by the operator.
      - path: notes/playbook.md
        content: |
          ## Daily playbook
          1. Check inbox.
          2. Run the morning brief.
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  security:
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 10001
      fsGroup: 10001
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    rbac:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/hermes
    networkPolicy:
      enabled: true
      additionalEgress:
        - to:
            - ipBlock:
                cidr: 0.0.0.0/0
                except:
                  - 169.254.169.254/32
          ports:
            - protocol: TCP
              port: 443
  storage:
    persistence:
      enabled: true
      size: 50Gi
      storageClassName: gp3
  networking:
    service:
      type: ClusterIP
    ingress:
      enabled: false
  observability:
    metrics:
      enabled: true
      secure: true
    serviceMonitor:
      enabled: true
      interval: 30s
    logging:
      level: info
  availability:
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    horizontalPodAutoscaler:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilization: 75
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
  probes:
    liveness:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 30
      periodSeconds: 30
    readiness:
      httpGet:
        path: /readyz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
  backup:
    s3:
      bucket: hermes-backups
      endpoint: s3.amazonaws.com
      region: us-east-1
      pathPrefix: prod/
      credentialsSecretRef:
        name: hermes-s3-creds
    schedule: "0 3 * * *"
    onDelete: true
    preUpdate: true
    historyLimit: 30
    failedHistoryLimit: 3
  runtime:
    python: "3.11"
    uv:
      enabled: true
    ffmpeg:
      enabled: true
    ripgrep:
      enabled: true
    extraPipPackages:
      - pandas==2.2.0
  gateways:
    telegram:
      enabled: true
      botTokenSecretRef:
        name: hermes-telegram
        key: token
    discord:
      enabled: true
      botTokenSecretRef:
        name: hermes-discord
        key: token
  profileStore:
    honcho:
      enabled: true
      image:
        repository: ghcr.io/plastic-labs/honcho
        tag: "0.0.36"
      persistence:
        enabled: true
        size: 5Gi
      apiKeySecretRef:
        name: hermes-honcho
        key: apiKey
  autoUpdate:
    enabled: true
    source:
      registry: ghcr.io/paperclipinc/hermes-agent
      channel: "1.x"
    pollInterval: 1h
    rollback:
      enabled: true
      probeFailureThreshold: 3
    backupBeforeUpdate: true
  selfConfigure:
    enabled: true
    allowedActions: [skills, config, envVars, workspaceFiles, profiles]
    protectedKeys:
      - "spec.image.*"
      - "spec.security.*"
      - "spec.storage.*"
      - "spec.backup.*"
      - "spec.networking.*"
  scheduling:
    nodeSelector:
      workload: agents
    tolerations:
      - key: agents
        operator: Equal
        value: "true"
        effect: NoSchedule
  initContainers:
    - name: warm-cache
      image: ghcr.io/paperclipinc/hermes-agent:1.4.2
      command: ["sh", "-c", "echo warming cache && sleep 2"]
  sidecars:
    - name: log-shipper
      image: ghcr.io/fluent/fluent-bit:3.0
      args: ["-c", "/fluent-bit/etc/fluent-bit.conf"]
  extraVolumes:
    - name: trace
      emptyDir: {}
  extraVolumeMounts:
    - name: trace
      mountPath: /var/run/trace
  envFrom:
    - configMapRef:
        name: hermes-env
  env:
    - name: DEPLOY_ENV
      value: production
  suspended: false
