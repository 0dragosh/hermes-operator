apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: multi-platform
spec:
  image:
    repository: ghcr.io/paperclipinc/hermes-agent
    tag: "1.4.2"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  gateways:
    telegram:
      enabled: true
      botTokenSecretRef:
        name: hermes-telegram
        key: token
    discord:
      enabled: true
      botTokenSecretRef:
        name: hermes-discord
        key: token
    slack:
      enabled: true
      botTokenSecretRef:
        name: hermes-slack
        key: botToken
      appTokenSecretRef:
        name: hermes-slack
        key: appToken
      signingSecretRef:
        name: hermes-slack
        key: signingSecret
    whatsapp:
      enabled: true
      providerSecretRef:
        name: hermes-whatsapp
        key: provider
    signal:
      enabled: true
      phoneNumberSecretRef:
        name: hermes-signal
        key: phoneNumber
      authTokenSecretRef:
        name: hermes-signal
        key: authToken
