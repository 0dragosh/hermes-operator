apiVersion: v1
kind: Secret
metadata:
  name: tg-secret
  namespace: {{ .WorkloadNamespace }}
type: Opaque
stringData:
  token: "dummy-telegram-token-for-e2e"
---
apiVersion: v1
kind: Secret
metadata:
  name: honcho-secret
  namespace: {{ .WorkloadNamespace }}
type: Opaque
stringData:
  api-key: "dummy-honcho-api-key-for-e2e"
---
apiVersion: hermes.agent/v1
kind: HermesInstance
metadata:
  name: e2e-gateways
  namespace: {{ .WorkloadNamespace }}
spec:
  image:
    repository: {{ .AgentImageRepository }}
    tag: "{{ .AgentImageTag }}"
    pullPolicy: IfNotPresent
  storage:
    persistence:
      enabled: true
      size: 1Gi
  config:
    raw: {}
  runtime:
    python: "3.11"
    uv:
      enabled: true
  gateways:
    telegram:
      enabled: true
      botTokenSecretRef:
        name: tg-secret
        key: token
      allowedUserIDs: [42]
  profileStore:
    honcho:
      enabled: true
      image:
        repository: {{ .HonchoImageRepository }}
        tag: "{{ .HonchoImageTag }}"
        pullPolicy: IfNotPresent
      persistence:
        enabled: true
        size: 1Gi
      apiKeySecretRef:
        name: honcho-secret
        key: api-key
