# .github/workflows/agent-image-smoke.yaml
#
# Per-PR smoke test: build the agent image on amd64, verify --help exits 0 and
# entrypoint.sh refuses to start without a config. Does NOT push.
name: agent-image-smoke

on:
  pull_request:
    paths:
      - 'images/hermes-agent/**'
      - '.github/workflows/agent-image-smoke.yaml'
      - 'Makefile'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Require uv.lock
        run: |
          set -eux
          if [ ! -f images/hermes-agent/uv.lock ]; then
            echo "images/hermes-agent/uv.lock is required for agent image smoke." >&2
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Read pinned HERMES_VERSION from pyproject.toml
        id: ver
        run: |
          set -eux
          tag=$(sed -n 's|.*hermes-agent @ git+https://github.com/NousResearch/hermes-agent@\([^"]*\).*|\1|p' images/hermes-agent/pyproject.toml)
          if [ -z "${tag}" ]; then
            echo "could not read hermes-agent git tag from pyproject.toml" >&2
            exit 1
          fi
          lock_rev_line="requires-dist = [{ name = \"hermes-agent\", git = \"https://github.com/NousResearch/hermes-agent?rev=${tag}\" }]"
          if ! grep -Fqx "${lock_rev_line}" images/hermes-agent/uv.lock; then
            echo "uv.lock does not contain the exact hermes-agent rev line for ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build image locally
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --build-arg HERMES_VERSION=${{ steps.ver.outputs.tag }} \
            --load \
            -t hermes-agent:smoke \
            images/hermes-agent

      - name: "Smoke: --help exits 0"
        run: docker run --rm --entrypoint /bin/sh hermes-agent:smoke -c 'hermes-agent --help >/dev/null'

      - name: "Smoke: required runtime tools exist"
        run: |
          set -eux
          docker run --rm --entrypoint /bin/sh hermes-agent:smoke -c 'aws --version'
          docker run --rm --entrypoint /bin/sh hermes-agent:smoke -c 'uv --version'
          docker run --rm --entrypoint /bin/sh hermes-agent:smoke -c 'test -f /opt/venv-template/pyproject.toml && test -f /opt/venv-template/uv.lock'
          docker run --rm --entrypoint /bin/sh hermes-agent:smoke -c 'zstd --version'
          docker run --rm --entrypoint /bin/sh hermes-agent:smoke -c 'tar --version'
          docker run --rm --entrypoint /bin/sh hermes-agent:smoke -c 'mktemp --version || mktemp -t hermes.XXXXXX'

      - name: "Smoke: entrypoint refuses missing config with EX_CONFIG (78)"
        run: |
          set +e
          docker run --rm --entrypoint /usr/local/bin/hermes-entrypoint hermes-agent:smoke
          rc=$?
          if [ "${rc}" != "78" ]; then
            echo "Expected exit 78 (EX_CONFIG), got ${rc}" >&2
            exit 1
          fi

      - name: "Smoke: non-root by default"
        run: |
          uid=$(docker run --rm --entrypoint id hermes-agent:smoke -u)
          [ "${uid}" = "1000" ] || { echo "Expected UID 1000, got ${uid}"; exit 1; }
