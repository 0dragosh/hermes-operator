name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version: "1.26" }
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with: { version: v2.12.2 }

  test-readonly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version: "1.26" }
      - name: Run read-only tests
        run: make test-readonly

  test-controller:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s: ["1.28", "1.29", "1.30", "1.31", "1.32"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version: "1.26" }
      - name: Run tests (k8s ${{ matrix.k8s }})
        env:
          ENVTEST_K8S_VERSION: ${{ matrix.k8s }}.0
        run: make test-controller

  generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version: "1.26" }
      - name: Regenerate manifests and code
        run: make manifests generate
      - name: Verify generated files are current
        run: |
          git diff --exit-code
          test -z "$(git status --short --untracked-files=all)"
