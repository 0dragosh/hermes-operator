name: Conformance

on:
  schedule:
    - cron: '0 4 * * *'    # 04:00 UTC nightly
  workflow_call:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'api/v1/**'
      - 'internal/controller/**'
      - 'internal/resources/**'
      - 'internal/webhook/**'
      - 'cmd/**'
      - 'config/**'
      - 'charts/**'
      - 'bundle/**'
      - 'test/conformance/**'
      - 'hack/kind-config.yaml'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/conformance.yaml'
      - '.github/workflows/release.yaml'
  pull_request:
    paths:
      - 'api/v1/**'
      - 'internal/controller/**'
      - 'internal/resources/**'
      - 'internal/webhook/**'
      - 'cmd/**'
      - 'config/**'
      - 'charts/**'
      - 'bundle/**'
      - 'test/conformance/**'
      - 'hack/kind-config.yaml'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/conformance.yaml'
      - '.github/workflows/release.yaml'
  workflow_dispatch:

jobs:
  negative:
    name: Negative (webhook deny paths)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version-file: go.mod }
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: hermes-conformance
          config: hack/kind-config.yaml
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --set crds.enabled=true \
            --wait --timeout 5m
      - run: make docker-build IMG=hermes-operator:dev
      - run: make conformance-install IMG=hermes-operator:dev
      - run: make conformance-negative

  idempotency:
    name: Idempotency
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version-file: go.mod }
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: hermes-conformance
          config: hack/kind-config.yaml
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --set crds.enabled=true \
            --wait --timeout 5m
      - run: make docker-build IMG=hermes-operator:dev
      - run: make conformance-install IMG=hermes-operator:dev
      - run: make conformance-idempotency

  upgrade:
    name: Upgrade path matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version-file: go.mod }
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make conformance-upgrade

  gitops:
    name: GitOps coexistence
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version-file: go.mod }
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: hermes-conformance
          config: hack/kind-config.yaml
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --set crds.enabled=true \
            --wait --timeout 5m
      - run: make docker-build IMG=hermes-operator:dev
      - run: make conformance-install IMG=hermes-operator:dev
      - run: make conformance-gitops

  failure-injection:
    name: Failure injection
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with: { go-version-file: go.mod }
      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
        with:
          cluster_name: hermes-conformance
          config: hack/kind-config.yaml
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace \
            --set crds.enabled=true \
            --wait --timeout 5m
      - run: make docker-build IMG=hermes-operator:dev
      - run: make conformance-install IMG=hermes-operator:dev
      - run: make conformance-failure

  # PR runs are advisory; nightly/release-tag runs gate releases.
  required:
    name: Conformance gate
    needs: [negative, idempotency, upgrade, gitops, failure-injection]
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_call' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - run: echo "All conformance jobs passed."
