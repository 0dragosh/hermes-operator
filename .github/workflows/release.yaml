name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  distribution-checks:
    name: Distribution Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
        with:
          version: v3.21.0

      - name: Install yq
        run: make yq

      - name: Run read-only tests
        run: make test-readonly

      - name: Verify generated manifests and code are current
        run: |
          make manifests generate
          git diff --exit-code
          test -z "$(git status --short --untracked-files=all)"

      - name: Check Helm and bundle RBAC drift
        run: |
          bash hack/check-helm-rbac.sh
          make sync-bundle-rbac-check

      - name: Check bundle metadata
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMG="ghcr.io/paperclipinc/hermes-operator:${GITHUB_REF_NAME}"
          make update-bundle-metadata VERSION="${VERSION}" IMG="${IMG}"
          git diff --exit-code bundle/manifests/hermes-operator.clusterserviceversion.yaml

      - name: Run distribution parity check if present
        run: |
          if [ -f hack/check-distribution-parity.sh ]; then
            bash hack/check-distribution-parity.sh
          else
            echo "hack/check-distribution-parity.sh not present; skipping."
          fi

      - name: Validate OLM bundle
        run: make bundle-validate

  conformance:
    name: Conformance
    uses: ./.github/workflows/conformance.yaml
    secrets: inherit

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [distribution-checks, conformance]
    steps:
      # Mint a short-lived App installation token. Required for the
      # release-undraft and SBOM-upload steps: GITHUB_TOKEN-issued events
      # don't fan out to downstream workflows. Replaces the long-lived
      # RELEASE_PLEASE_TOKEN PAT.
      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Run GoReleaser
        id: goreleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          distribution: goreleaser
          version: v2.16.0
          # --skip=validate bypasses the git-state checks (dirty tree,
          # tag-on-HEAD). dist/install.yaml is generated by the
          # `before:hooks` in .goreleaser.yaml, which runs after --clean.
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image_tags
        run: |
          TAG="${{ github.ref_name }}"
          MAJOR_MINOR=$(echo "$TAG" | sed 's/^v//' | cut -d. -f1,2)
          IMAGE="ghcr.io/paperclipinc/hermes-operator"
          {
            echo "image=${IMAGE}"
            echo "major_minor=${MAJOR_MINOR}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            echo "${IMAGE}:${MAJOR_MINOR}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push container image (multi-arch)
        id: docker_build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.image_tags.outputs.tags }}
          provenance: true
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=hermes-operator
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/paperclipinc/hermes-operator
            org.opencontainers.image.licenses=Apache-2.0

      - name: Compute immutable image reference
        id: image_ref
        env:
          IMAGE: ${{ steps.image_tags.outputs.image }}
          DIGEST: ${{ steps.docker_build.outputs.digest }}
        run: |
          set -eu
          test -n "${IMAGE}"
          test -n "${DIGEST}"
          echo "ref=${IMAGE}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign container image with cosign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ steps.image_ref.outputs.ref }}
        run: cosign sign --yes "${IMAGE_REF}"

      - name: Generate SBOM for container image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ steps.image_ref.outputs.ref }}
          artifact-name: sbom-${{ github.ref_name }}.spdx.json
          output-file: sbom-${{ github.ref_name }}.spdx.json

      - name: Attest SBOM with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ steps.image_ref.outputs.ref }}
          TAG: ${{ github.ref_name }}
        run: cosign attest --yes --predicate "sbom-${TAG}.spdx.json" --type spdxjson "${IMAGE_REF}"

      - name: Upload SBOM to GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: sbom-${{ github.ref_name }}.spdx.json
          token: ${{ steps.app-token.outputs.token }}

      - name: Publish release (undraft)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          draft: false
          token: ${{ steps.app-token.outputs.token }}

  helm-release:
    name: Helm OCI Release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
        with:
          version: v3.21.0

      - name: Package and push Helm chart
        run: |
          CHART_VERSION="${{ github.ref_name }}"
          CHART_VERSION="${CHART_VERSION#v}"
          helm package charts/hermes-operator \
            --version "${CHART_VERSION}" \
            --app-version "${{ github.ref_name }}"
          helm push hermes-operator-${CHART_VERSION}.tgz oci://ghcr.io/paperclipinc/charts
