# .github/workflows/agent-image.yaml
#
# Builds and publishes ghcr.io/paperclipinc/hermes-agent for every hermes-agent
# release in the supported matrix. Triggered:
#   - Manually via workflow_dispatch (engineer picks the HERMES_VERSION).
#   - On every push of a tag matching `agent/vX.Y.Z`.
#
# Cosign-signed (keyless OIDC) and SBOM via Syft.
name: agent-image

on:
  workflow_dispatch:
    inputs:
      hermes_version:
        description: "Upstream hermes-agent release tag (e.g. v2026.5.29.2)"
        required: true
        type: string
  push:
    tags:
      - 'agent/v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve HERMES_VERSION
        id: ver
        run: |
          set -eux
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.hermes_version }}"
          else
            v="${GITHUB_REF#refs/tags/agent/}"
          fi
          # Strip any leading "v" for the bare package version, keep the tag form too.
          bare="${v#v}"
          echo "tag=${v}" >> "$GITHUB_OUTPUT"
          echo "bare=${bare}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify uv.lock matches the requested HERMES_VERSION
        env:
          HERMES_TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -eux
          # The lockfile is the source of truth; refuse to ship if the committed lock
          # disagrees with the requested upstream git tag.
          if [ ! -f images/hermes-agent/uv.lock ]; then
            echo "images/hermes-agent/uv.lock is required. Run: make agent-image-relock HERMES_VERSION=${HERMES_TAG} and commit it." >&2
            exit 1
          fi
          lock_rev_line="requires-dist = [{ name = \"hermes-agent\", git = \"https://github.com/NousResearch/hermes-agent?rev=${HERMES_TAG}\" }]"
          if ! grep -Fqx "${lock_rev_line}" images/hermes-agent/uv.lock; then
            echo "uv.lock does not contain the exact hermes-agent rev line for ${HERMES_TAG}" >&2
            echo "Run: make agent-image-relock HERMES_VERSION=${HERMES_TAG} and commit." >&2
            exit 1
          fi
          pyproject_dep_line="    \"hermes-agent @ git+https://github.com/NousResearch/hermes-agent@${HERMES_TAG}\","
          if ! grep -Fqx "${pyproject_dep_line}" images/hermes-agent/pyproject.toml; then
            echo "pyproject.toml does not contain the exact hermes-agent dependency line for ${HERMES_TAG}" >&2
            echo "Run: make agent-image-relock HERMES_VERSION=${HERMES_TAG} and commit." >&2
            exit 1
          fi

      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: images/hermes-agent
          file: images/hermes-agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/paperclipinc/hermes-agent:${{ steps.ver.outputs.tag }}
          build-args: |
            HERMES_VERSION=${{ steps.ver.outputs.tag }}
          provenance: true
          sbom: true

      - name: Compute immutable image reference
        id: image_ref
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -eu
          test -n "${DIGEST}"
          echo "ref=ghcr.io/paperclipinc/hermes-agent@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac

      - name: Sign image (keyless OIDC)
        env:
          IMAGE_REF: ${{ steps.image_ref.outputs.ref }}
        run: |
          cosign sign --yes "${IMAGE_REF}"

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Generate SBOM
        env:
          IMAGE_REF: ${{ steps.image_ref.outputs.ref }}
        run: |
          syft "${IMAGE_REF}" \
            -o spdx-json=sbom.spdx.json

      - name: Attach SBOM as Cosign attestation
        env:
          IMAGE_REF: ${{ steps.image_ref.outputs.ref }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${IMAGE_REF}"
